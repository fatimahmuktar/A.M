name: neu-attendai
services:
  - name: api-server
    type: web
    port: 8080
    github:
      repository: fatimahmuktar/A.M
      branch: main
      build_command: "pnpm install --frozen-lockfile && pnpm -r --if-present run build && cp -r artifacts/neu-attendai/dist/public artifacts/api-server/public/"
      run_command: "node artifacts/api-server/dist/index.mjs"
    env:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_DIR
        value: artifacts/api-server/public
    scalings:
      min: 1
      max: 1
